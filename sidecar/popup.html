<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img {
      width: 32px;
      height: 32px;
    }
    .header h1 {
      font-size: 16px;
      margin: 0;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      font-size: 12px;
      color: #94a3b8;
      background: #1e293b;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #334155;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: #2563eb;
      color: white;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="Xenon">
    <h1>Xenon Sidecar</h1>
  </div>
  <div class="status">
    Ready to extract. Visit an Amazon or Flipkart product page to begin.
  </div>
  <a href="http://localhost:3000/upload" target="_blank" class="btn">Open Dashboard</a>
</body>
</html>
